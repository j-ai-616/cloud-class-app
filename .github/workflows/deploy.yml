# GitHub Actions 워크플로우 이름이다.
# GitHub 저장소의 Actions 탭에서 이 이름으로 표시된다.
name: Test, build, and deploy

# 워크플로우가 실행되는 조건이다.
on:
  # main 브랜치로 들어오는 Pull Request가 생성되거나 업데이트될 때 실행한다.
  # 이 경우에는 테스트만 수행하고, 이미지 push와 배포는 하지 않는다.
  pull_request:
    branches: [main]

  # main 브랜치에 코드가 push될 때 실행한다.
  # 이 경우에는 테스트, 이미지 빌드/푸시, 배포까지 진행한다.
  push:
    branches: [main]

  # GitHub Actions 화면에서 사용자가 직접 실행할 수 있게 한다.
  workflow_dispatch:

# 워크플로우 전체에 기본으로 부여할 GitHub 권한이다.
permissions:
  # 저장소 코드를 읽을 수 있는 권한이다.
  contents: read

# 워크플로우 전체에서 사용할 공통 환경 변수이다.
# vars는 GitHub Repository Variables 또는 Organization Variables에 등록한 값이다.
env:
  # AWS 리전 예: ap-northeast-2
  AWS_REGION: ${{ vars.AWS_REGION }}

  # ECR 저장소 이름 예: cloud-class-app
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

# 실제 실행 작업들을 정의한다.
jobs:
  # 1단계: 테스트 작업이다.
  # PR과 push 모두에서 실행된다.
  test:
    # GitHub가 제공하는 Ubuntu 최신 실행 환경에서 작업한다.
    runs-on: ubuntu-latest

    steps:
      # 저장소 코드를 Actions 실행 환경으로 가져온다.
      - name: Check out source
        uses: actions/checkout@v4

      # Python 3.12 실행 환경을 준비한다.
      # cache: pip는 pip 패키지 캐시를 사용해 의존성 설치 시간을 줄인다.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # requirements.txt에 기록된 Python 패키지를 설치한다.
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Django 설정이 올바른지 검사한다.
      # CI 환경에는 실제 운영 secret을 넣지 않고 테스트용 값을 임시로 넣는다.
      - name: Check Django configuration
        env:
          DJANGO_SECRET_KEY: ci-only-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py check

      # Django 테스트를 실행한다.
      # 테스트 실행에도 Django 설정값이 필요하므로 같은 환경 변수를 주입한다.
      - name: Run Django tests
        env:
          DJANGO_SECRET_KEY: ci-only-key
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
        run: python manage.py test

      # 테스트용 Docker 이미지를 빌드한다.
      # --platform linux/amd64는 AWS EC2 배포 환경과 맞추기 위한 설정이다.
      # 특히 macOS ARM 환경에서 만든 이미지와 서버 아키텍처가 달라지는 문제를 방지한다.
      - name: Build test image
        run: |
          docker build \
            --platform linux/amd64 \
            --tag cloud-class-app:ci \
            .

      # 빌드된 컨테이너 이미지 안에서도 Django 테스트를 실행한다.
      # 로컬 Python 환경에서는 성공했지만 컨테이너 안에서 실패하는 문제를 잡기 위한 단계이다.
      - name: Test container image
        run: |
          docker run --rm \
            -e DJANGO_SECRET_KEY=ci-only-key \
            -e DJANGO_DEBUG=False \
            -e DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1 \
            cloud-class-app:ci \
            python manage.py test

  # 2단계: 이미지를 빌드하고 Amazon ECR에 push하는 작업이다.
  build-and-push:
    # pull_request 이벤트에서는 실행하지 않는다.
    # 즉, PR에서는 테스트만 하고 실제 이미지 push는 하지 않는다.
    if: github.event_name != 'pull_request'

    # test 작업이 성공해야만 실행된다.
    needs: test

    runs-on: ubuntu-latest

    # 이 job에서 필요한 권한이다.
    permissions:
      # 저장소 코드를 읽기 위한 권한이다.
      contents: read

      # GitHub OIDC로 AWS Role을 Assume하기 위한 권한이다.
      # 장기 Access Key 없이 AWS 인증을 하기 위해 필요하다.
      id-token: write

    steps:
      # 저장소 코드를 Actions 실행 환경으로 가져온다.
      - name: Check out source
        uses: actions/checkout@v4

      # GitHub Actions가 AWS IAM Role을 Assume하도록 설정한다.
      # vars.AWS_ROLE_ARN에는 GitHub Actions가 사용할 AWS IAM Role ARN이 들어 있어야 한다.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Amazon ECR에 Docker 로그인을 수행한다.
      # 이후 docker/build-push-action이 ECR로 이미지를 push할 수 있다.
      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Docker 이미지를 빌드하고 ECR에 push한다.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          # Dockerfile과 소스 파일이 있는 빌드 기준 경로이다.
          context: .

          # EC2 배포 환경과 맞추기 위해 linux/amd64 이미지로 빌드한다.
          platforms: linux/amd64

          # true이면 빌드한 이미지를 레지스트리에 push한다.
          push: true

          # 하나의 이미지를 두 개의 태그로 push한다.
          # 1. github.sha: 특정 커밋을 정확히 가리키는 태그
          # 2. latest: 가장 최근 배포 후보를 가리키는 태그
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

  # 3단계: EC2에 배포하는 작업이다.
  deploy:
    # pull_request에서는 배포하지 않는다.
    # 또한 EC2_INSTANCE_ID 변수가 비어 있으면 배포하지 않는다.
    if: github.event_name != 'pull_request' && vars.EC2_INSTANCE_ID != ''

    # ECR 이미지 push가 끝난 뒤 실행된다.
    needs: build-and-push

    runs-on: ubuntu-latest

    permissions:
      # 저장소 읽기 권한이다.
      contents: read

      # GitHub OIDC로 AWS Role을 Assume하기 위한 권한이다.
      id-token: write

    steps:
      # 배포 작업에서도 AWS CLI를 사용해야 하므로 AWS 인증을 설정한다.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # AWS Systems Manager Session Manager/Run Command를 사용해
      # EC2에 직접 SSH 접속하지 않고 배포 스크립트를 실행한다.
      - name: Deploy commit image with SSM
        shell: bash
        run: |
          # -e: 명령 실패 시 즉시 종료
          # -u: 정의되지 않은 변수를 사용하면 오류
          # -o pipefail: 파이프라인 중간 명령 실패도 실패로 처리
          set -euo pipefail

          # EC2 인스턴스에 SSM Run Command를 보낸다.
          # 실행되는 명령:
          # IMAGE_TAG=<현재 커밋 SHA> /home/ubuntu/cloud-class-deploy/deploy.sh
          #
          # deploy.sh는 IMAGE_TAG 값을 읽어
          # ECR에서 해당 커밋 이미지 태그를 pull하고 컨테이너를 교체하는 역할을 한다.
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ vars.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy GitHub commit ${{ github.sha }}" \
            --parameters 'commands=["IMAGE_TAG=${{ github.sha }} /home/ubuntu/cloud-class-deploy/deploy.sh"]' \
            --query 'Command.CommandId' \
            --output text)

          # SSM 명령 실행이 끝날 때까지 기다린다.
          # wait 명령은 실패 상태에서도 종료 코드가 실패로 나올 수 있으므로
          # 잠시 set +e로 바꿔 종료 코드를 직접 저장한다.
          set +e
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}"
          WAIT_EXIT=$?
          set -e

          # SSM 명령의 표준 출력과 표준 에러를 조회한다.
          # 배포 실패 시 원인을 GitHub Actions 로그에서 확인하기 위한 단계이다.
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}'

          # SSM 명령의 최종 상태만 다시 조회한다.
          COMMAND_STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ vars.EC2_INSTANCE_ID }}" \
            --query 'Status' \
            --output text)

          # wait 명령이 실패했거나 SSM 최종 상태가 Success가 아니면
          # GitHub Actions job을 실패 처리한다.
          if [[ "$WAIT_EXIT" -ne 0 || "$COMMAND_STATUS" != "Success" ]]; then
            exit 1
          fi
